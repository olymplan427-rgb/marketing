<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 블로그 포스트 생성기</title>
  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <!-- 나눔명조 폰트 (기억의 서랍 전용) -->
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Pretendard Variable"', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', '"Helvetica Neue"', '"Segoe UI"', '"Apple SD Gothic Neo"', '"Noto Sans KR"', '"Malgun Gothic"', 'sans-serif'],
            mono: ['"Geist Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
          // DESIGN.md monochrome tokens — values reference CSS vars in styles.css
          // so styles.css stays the single source of truth.
          colors: {
            graphite: 'var(--color-graphite)',
            carbon: 'var(--color-carbon)',
            concrete: 'var(--color-concrete)',
            ash: 'var(--color-ash)',
            smoke: 'var(--color-smoke)',
            hairline: 'var(--color-hairline)',
            mist: 'var(--color-mist)',
            chalk: 'var(--color-chalk)',
          },
          borderRadius: {
            card: 'var(--radius-xl)',   // 14px
            nav: 'var(--radius-lg)',    // 10px
            badge: 'var(--radius-3xl)', // 26px
          },
        }
      }
    }
  </script>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.16.0"
  }
}
</script>
<link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-chalk min-h-screen">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
